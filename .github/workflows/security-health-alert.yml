name: Security Health Alert

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-health-alert
  cancel-in-progress: false

jobs:
  check:
    name: Check abuse signals
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Request protected security check
        env:
          SECURITY_HEALTH_CRON_SECRET: ${{ secrets.SECURITY_HEALTH_CRON_SECRET }}
          SECURITY_HEALTH_URL: https://facturacion-autonomos.app/api/security/health-alert
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SECURITY_HEALTH_CRON_SECRET}" ]]; then
            echo "::error::SECURITY_HEALTH_CRON_SECRET is not configured."
            exit 1
          fi

          response_file="$(mktemp)"
          trap 'rm -f "${response_file}"' EXIT

          http_code="$(curl \
            --silent \
            --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --max-time 90 \
            --retry 2 \
            --header "Authorization: Bearer ${SECURITY_HEALTH_CRON_SECRET}" \
            "${SECURITY_HEALTH_URL}")"

          if [[ "${http_code}" != "200" ]]; then
            echo "::error::Security health endpoint returned HTTP ${http_code}."
            exit 1
          fi

          if ! jq -e '.ok == true' "${response_file}" >/dev/null; then
            echo "::error::Security health endpoint returned an invalid response."
            exit 1
          fi

          level="$(jq -r '.level // "unknown"' "${response_file}")"
          result="$(jq -r 'if .alertSent then "alert_sent" else (.reason // "no_alert") end' "${response_file}")"
          printf 'Security health check completed: level=%s result=%s\n' "${level}" "${result}"
