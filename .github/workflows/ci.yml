name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "chore/**"

permissions:
  contents: read
  deployments: read
  statuses: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # El verificador del manual contrasta capturas y fixtures con sus
          # commits históricos; un checkout superficial daría una falsa alarma.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check Supabase migration conventions
        run: npm run check:migrations

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  supabase-acceptance:
    name: Supabase Acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
          psql --version

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.107.0

      - name: Start Supabase local
        run: supabase start --exclude edge-runtime

      - name: Wait for Supabase health
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|DB_URL)=')"

          for attempt in {1..60}; do
            if pg_isready -d "$DB_URL" >/dev/null 2>&1 \
              && curl -fsS "$API_URL/auth/v1/health" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          supabase status
          exit 1

      - name: Export local Supabase credentials
        run: |
          eval "$(supabase status -o env | grep -E '^(ANON_KEY|API_URL|DB_URL|SERVICE_ROLE_KEY)=')"
          {
            printf 'PHASE1_ACCEPTANCE_SUPABASE_URL=%s\n' "$API_URL"
            printf 'PHASE1_ACCEPTANCE_ANON_KEY=%s\n' "$ANON_KEY"
            printf 'PHASE1_ACCEPTANCE_SERVICE_ROLE_KEY=%s\n' "$SERVICE_ROLE_KEY"
            printf 'PHASE1_ACCEPTANCE_DATABASE_URL=%s\n' "$DB_URL"
            printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$API_URL"
            printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$ANON_KEY"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Start Next.js app
        env:
          NEXT_PUBLIC_BILLING_ENABLED: "true"
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_SECRET_KEY: sk_test_local_acceptance_dummy
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
        run: |
          npm run dev > /tmp/factura-autonomo-next.log 2>&1 &
          echo "$!" > /tmp/factura-autonomo-next.pid

          for attempt in {1..60}; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/api/webhooks/stripe || true)"
            if [ "$status" = "405" ]; then
              exit 0
            fi
            sleep 2
          done

          cat /tmp/factura-autonomo-next.log
          exit 1

      - name: Run Phase 1 acceptance
        env:
          PHASE1_ACCEPTANCE_ALLOW_DESTRUCTIVE: "true"
          PHASE1_ACCEPTANCE_TARGET: local
          PHASE1_ACCEPTANCE_APP_URL: http://127.0.0.1:3000
          PHASE1_ACCEPTANCE_STRIPE_WEBHOOK_SECRET: whsec_test
        run: npm run test:phase1-acceptance

      - name: Stop local services
        if: always()
        run: |
          if [ -f /tmp/factura-autonomo-next.pid ]; then
            kill "$(cat /tmp/factura-autonomo-next.pid)" 2>/dev/null || true
          fi
          supabase stop --no-backup || true

  production-domain:
    name: Production Domain
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality
      - supabase-acceptance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      PRODUCTION_DOMAIN: facturacion-autonomos.app
      VERCEL_PROJECT: factu-autonomo
      VERCEL_SCOPE: team_igEbPlyUgBxnP6cO2sUObD5a
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout deployment history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret is required to assign the production domain."
            exit 1
          fi

      - name: Wait for Vercel production deployment
        env:
          EXPECTED_GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          accept_deployment_url() {
            local candidate="$1"
            if [[ ! "$candidate" =~ ^https://[a-zA-Z0-9-]+(\.[a-zA-Z0-9-]+)*\.vercel\.app$ ]]; then
              echo "Unexpected Vercel deployment URL: $candidate"
              exit 1
            fi
            echo "VERCEL_DEPLOYMENT_URL=$candidate" >> "$GITHUB_ENV"
            exit 0
          }

          inspect_vercel_deployment() {
            local deployment_uid="$1"
            local deployment_json

            if [[ ! "$deployment_uid" =~ ^dpl_[a-zA-Z0-9]+$ ]]; then
              return 1
            fi

            if ! deployment_json="$(
              curl \
                --fail \
                --silent \
                --show-error \
                --connect-timeout 3 \
                --max-time 8 \
                --get "https://api.vercel.com/v13/deployments/${deployment_uid}" \
                -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                --data-urlencode "teamId=${VERCEL_SCOPE}" \
                --data-urlencode "withGitRepoInfo=true" \
                2>/dev/null
            )"; then
              return 1
            fi

            jq -er \
              --arg deployment_uid "$deployment_uid" \
              --arg project_id "$VERCEL_PROJECT_ID" \
              --arg project_name "$VERCEL_PROJECT" \
              --arg repository_id "$EXPECTED_GITHUB_REPOSITORY_ID" \
              'select(
                .id == $deployment_uid
                and .projectId == $project_id
                and .name == $project_name
                and .target == "production"
                and .gitSource.type == "github"
                and ((.gitSource.repoId | tostring) == $repository_id)
                and .gitSource.ref == "main"
                and ((.gitSource.sha | type) == "string")
                and ((.readyState // .state // "") | type == "string")
                and (.url | type == "string")
                and (.buildSkipped | type == "boolean")
                and (.createdAt | type == "number")
              )
              | [
                  .gitSource.sha,
                  (.readyState // .state),
                  .url,
                  .buildSkipped,
                  .createdAt
                ]
              | map(tostring)
              | join("|")' \
              <<< "$deployment_json" \
              2>/dev/null
          }

          find_vercel_deployment_for_sha() {
            local expected_sha="$1"
            local deployments_json
            local deployment_count
            local deployment_index
            local deployment_uid
            local inspected_deployment
            local actual_sha
            local state
            local host
            local build_skipped
            local created_at
            local newest_created_at=-1
            local newest_state=""
            local newest_host=""
            local newest_build_skipped="false"

            if ! deployments_json="$(
              curl \
                --fail \
                --silent \
                --show-error \
                --connect-timeout 3 \
                --max-time 8 \
                --get "https://api.vercel.com/v7/deployments" \
                -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                --data-urlencode "teamId=${VERCEL_SCOPE}" \
                --data-urlencode "projectId=${VERCEL_PROJECT_ID}" \
                --data-urlencode "sha=${expected_sha}" \
                --data-urlencode "target=production" \
                --data-urlencode "limit=5" \
                2>/dev/null
            )"; then
              return 1
            fi

            if ! deployment_count="$(
              jq -er '.deployments | length' \
                <<< "$deployments_json" \
                2>/dev/null
            )"; then
              return 1
            fi

            if [ "$deployment_count" -eq 0 ]; then
              printf 'ABSENT||false\n'
              return 0
            fi

            deployment_index=0
            while [ "$deployment_index" -lt "$deployment_count" ]; do
              deployment_uid="$(
                jq -r ".deployments[$deployment_index].uid // empty" \
                  <<< "$deployments_json"
              )"

              if inspected_deployment="$(inspect_vercel_deployment "$deployment_uid")"; then
                IFS='|' read -r actual_sha state host build_skipped created_at \
                  <<< "$inspected_deployment"
                if [ "$actual_sha" = "$expected_sha" ] \
                  && [ "$created_at" -gt "$newest_created_at" ]; then
                  newest_created_at="$created_at"
                  newest_state="$state"
                  newest_host="$host"
                  newest_build_skipped="$build_skipped"
                fi
              fi

              deployment_index=$((deployment_index + 1))
            done

            if [ -n "$newest_state" ]; then
              printf '%s|%s|%s\n' \
                "$newest_state" \
                "$newest_host" \
                "$newest_build_skipped"
              return 0
            fi

            return 1
          }

          is_deploy_equivalent_sha() {
            local candidate_sha="$1"
            if [[ ! "$candidate_sha" =~ ^[0-9a-f]{40}$ ]]; then
              return 1
            fi
            if ! git merge-base --is-ancestor "$candidate_sha" "$GITHUB_SHA"; then
              return 1
            fi
            git diff --quiet \
              "$candidate_sha" \
              "$GITHUB_SHA" \
              -- \
              . \
              ':(exclude).github/workflows/ci.yml'
          }

          if [[ ! "$EXPECTED_GITHUB_REPOSITORY_ID" =~ ^[0-9]+$ ]]; then
            echo "GitHub repository ID is unavailable."
            exit 1
          fi

          if ! vercel_project_json="$(
            curl \
              --fail \
              --silent \
              --show-error \
              --connect-timeout 3 \
              --max-time 8 \
              --get "https://api.vercel.com/v9/projects/${VERCEL_PROJECT}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              --data-urlencode "teamId=${VERCEL_SCOPE}" \
              2>/dev/null
          )"; then
            echo "Unable to resolve the Vercel project identity."
            exit 1
          fi

          if ! VERCEL_PROJECT_ID="$(
            jq -er \
              --arg project_name "$VERCEL_PROJECT" \
              'select(.name == $project_name)
              | .id
              | select(test("^prj_[a-zA-Z0-9]+$"))' \
              <<< "$vercel_project_json" \
              2>/dev/null
          )"; then
            echo "Vercel returned an unexpected project identity."
            exit 1
          fi

          mapfile -t deploy_equivalent_shas < <(
            git rev-list --first-parent --max-count=5 "${GITHUB_SHA}^" |
              while IFS= read -r candidate_sha; do
                if is_deploy_equivalent_sha "$candidate_sha"; then
                  printf '%s\n' "$candidate_sha"
                else
                  break
                fi
              done
          )

          deadline=$((SECONDS + 720))
          attempt=0
          github_terminal_state=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            attempt=$((attempt + 1))
            if deployments_json="$(
              timeout 8s gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/deployments?sha=${GITHUB_SHA}&environment=Production" \
                2>/dev/null
            )"; then
              statuses_url="$(jq -r '.[0].statuses_url // empty' <<< "$deployments_json")"

              if [ -n "$statuses_url" ]; then
                if statuses_json="$(
                  timeout 8s gh api \
                    -H "Accept: application/vnd.github+json" \
                    "$statuses_url" \
                    2>/dev/null
                )"; then
                  state="$(jq -r '.[0].state // empty' <<< "$statuses_json")"
                  deployment_url="$(jq -r '.[0].environment_url // .[0].target_url // empty' <<< "$statuses_json")"

                  if [ "$state" = "success" ] && [ -n "$deployment_url" ]; then
                    accept_deployment_url "$deployment_url"
                  fi

                  if [ "$state" = "failure" ] || [ "$state" = "error" ]; then
                    github_terminal_state="$state"
                  fi
                else
                  echo "GitHub deployment status API is temporarily unavailable (attempt ${attempt}); checking Vercel directly."
                fi
              fi
            else
              echo "GitHub deployments API is temporarily unavailable (attempt ${attempt}); checking Vercel directly."
            fi

            allow_deploy_equivalent=false
            if current_deployment="$(find_vercel_deployment_for_sha "$GITHUB_SHA")"; then
              IFS='|' read -r current_state current_host current_build_skipped \
                <<< "$current_deployment"

              if [ "$current_state" = "READY" ] && [ -n "$current_host" ]; then
                accept_deployment_url "https://${current_host}"
              fi

              if [ "$current_state" = "ABSENT" ]; then
                if [ -n "$github_terminal_state" ]; then
                  echo "GitHub reported a failed deployment without a verifiable skipped build."
                  exit 1
                fi
                allow_deploy_equivalent=true
              elif [ "$current_state" = "CANCELED" ] \
                && [ "$current_build_skipped" = "true" ]; then
                allow_deploy_equivalent=true
              elif [ "$current_state" = "ERROR" ] \
                || [ "$current_state" = "CANCELED" ] \
                || [ "$current_state" = "BLOCKED" ]; then
                echo "Vercel deployment failed with state: $current_state"
                exit 1
              elif [ -n "$github_terminal_state" ]; then
                echo "GitHub reported a failed deployment that Vercel did not mark as skipped."
                exit 1
              fi
            else
              echo "Vercel deployment details are temporarily unavailable (attempt ${attempt}); retrying."
            fi

            if [ "$allow_deploy_equivalent" = "true" ]; then
              for candidate_sha in "${deploy_equivalent_shas[@]}"; do
                if inspected_deployment="$(find_vercel_deployment_for_sha "$candidate_sha")"; then
                  IFS='|' read -r vercel_state vercel_host _build_skipped \
                    <<< "$inspected_deployment"
                  if [ "$vercel_state" = "READY" ] && [ -n "$vercel_host" ]; then
                    echo "Using a deploy-equivalent Vercel build because only the production workflow differs."
                    accept_deployment_url "https://${vercel_host}"
                  fi
                fi
              done
            fi

            remaining=$((deadline - SECONDS))
            if [ "$remaining" -le 0 ]; then
              break
            fi
            if [ "$remaining" -gt 10 ]; then
              sleep 10
            else
              sleep "$remaining"
            fi
          done

          echo "Timed out waiting for a successful Vercel production deployment."
          exit 1

      - name: Assign production domain
        run: |
          npx --yes vercel@latest alias set "$VERCEL_DEPLOYMENT_URL" "$PRODUCTION_DOMAIN" \
            --scope "$VERCEL_SCOPE" \
            --token "$VERCEL_TOKEN"

      - name: Verify production domain
        run: |
          for attempt in {1..30}; do
            body="$(curl -fsSL "https://${PRODUCTION_DOMAIN}" || true)"
            if grep -q "Facturación Autónomos" <<< "$body"; then
              exit 0
            fi
            sleep 5
          done

          echo "Production domain did not respond with the expected brand after alias assignment."
          exit 1
