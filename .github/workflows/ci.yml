name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "chore/**"

permissions:
  contents: read
  deployments: read
  statuses: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # El verificador del manual contrasta capturas y fixtures con sus
          # commits históricos; un checkout superficial daría una falsa alarma.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check Supabase migration conventions
        run: npm run check:migrations

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  supabase-acceptance:
    name: Supabase Acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
          psql --version

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.107.0

      - name: Start Supabase local
        run: supabase start --exclude edge-runtime

      - name: Wait for Supabase health
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|DB_URL)=')"

          for attempt in {1..60}; do
            if pg_isready -d "$DB_URL" >/dev/null 2>&1 \
              && curl -fsS "$API_URL/auth/v1/health" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          supabase status
          exit 1

      - name: Export local Supabase credentials
        run: |
          eval "$(supabase status -o env | grep -E '^(ANON_KEY|API_URL|DB_URL|SERVICE_ROLE_KEY)=')"
          {
            printf 'PHASE1_ACCEPTANCE_SUPABASE_URL=%s\n' "$API_URL"
            printf 'PHASE1_ACCEPTANCE_ANON_KEY=%s\n' "$ANON_KEY"
            printf 'PHASE1_ACCEPTANCE_SERVICE_ROLE_KEY=%s\n' "$SERVICE_ROLE_KEY"
            printf 'PHASE1_ACCEPTANCE_DATABASE_URL=%s\n' "$DB_URL"
            printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$API_URL"
            printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$ANON_KEY"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Start Next.js app
        env:
          NEXT_PUBLIC_BILLING_ENABLED: "true"
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_SECRET_KEY: sk_test_local_acceptance_dummy
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
        run: |
          npm run dev > /tmp/factura-autonomo-next.log 2>&1 &
          echo "$!" > /tmp/factura-autonomo-next.pid

          for attempt in {1..60}; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/api/webhooks/stripe || true)"
            if [ "$status" = "405" ]; then
              exit 0
            fi
            sleep 2
          done

          cat /tmp/factura-autonomo-next.log
          exit 1

      - name: Run Phase 1 acceptance
        env:
          PHASE1_ACCEPTANCE_ALLOW_DESTRUCTIVE: "true"
          PHASE1_ACCEPTANCE_TARGET: local
          PHASE1_ACCEPTANCE_APP_URL: http://127.0.0.1:3000
          PHASE1_ACCEPTANCE_STRIPE_WEBHOOK_SECRET: whsec_test
        run: npm run test:phase1-acceptance

      - name: Stop local services
        if: always()
        run: |
          if [ -f /tmp/factura-autonomo-next.pid ]; then
            kill "$(cat /tmp/factura-autonomo-next.pid)" 2>/dev/null || true
          fi
          supabase stop --no-backup || true

  production-domain:
    name: Production Domain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - quality
      - supabase-acceptance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      PRODUCTION_DOMAIN: facturacion-autonomos.app
      VERCEL_SCOPE: team_igEbPlyUgBxnP6cO2sUObD5a
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret is required to assign the production domain."
            exit 1
          fi

      - name: Wait for Vercel production deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          accept_deployment_url() {
            local candidate="$1"
            if [[ ! "$candidate" =~ ^https://[a-zA-Z0-9-]+(\.[a-zA-Z0-9-]+)*\.vercel\.app$ ]]; then
              echo "Unexpected Vercel deployment URL: $candidate"
              exit 1
            fi
            echo "VERCEL_DEPLOYMENT_URL=$candidate" >> "$GITHUB_ENV"
            exit 0
          }

          for attempt in {1..60}; do
            if deployments_json="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/deployments?sha=${GITHUB_SHA}&environment=Production" \
                2>/dev/null
            )"; then
              statuses_url="$(jq -r '.[0].statuses_url // empty' <<< "$deployments_json")"

              if [ -n "$statuses_url" ]; then
                if statuses_json="$(
                  gh api \
                    -H "Accept: application/vnd.github+json" \
                    "$statuses_url" \
                    2>/dev/null
                )"; then
                  state="$(jq -r '.[0].state // empty' <<< "$statuses_json")"
                  deployment_url="$(jq -r '.[0].environment_url // .[0].target_url // empty' <<< "$statuses_json")"

                  if [ "$state" = "success" ] && [ -n "$deployment_url" ]; then
                    accept_deployment_url "$deployment_url"
                  fi

                  if [ "$state" = "failure" ] || [ "$state" = "error" ]; then
                    echo "Vercel deployment failed with state: $state"
                    exit 1
                  fi
                else
                  echo "GitHub deployment status API is temporarily unavailable (attempt ${attempt}/60); checking Vercel directly."
                fi
              fi
            else
              echo "GitHub deployments API is temporarily unavailable (attempt ${attempt}/60); checking Vercel directly."
            fi

            if vercel_deployments_json="$(
              curl \
                --fail \
                --silent \
                --show-error \
                --connect-timeout 3 \
                --max-time 8 \
                --get "https://api.vercel.com/v7/deployments" \
                -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                --data-urlencode "teamId=${VERCEL_SCOPE}" \
                --data-urlencode "sha=${GITHUB_SHA}" \
                --data-urlencode "target=production" \
                --data-urlencode "limit=1" \
                2>/dev/null
            )"; then
              if vercel_state="$(
                jq -er '.deployments[0].readyState // .deployments[0].state // empty' \
                  <<< "$vercel_deployments_json" \
                  2>/dev/null
              )"; then
                vercel_target="$(jq -r '.deployments[0].target // empty' <<< "$vercel_deployments_json")"
                vercel_host="$(jq -r '.deployments[0].url // empty' <<< "$vercel_deployments_json")"

                if [ "$vercel_state" = "READY" ] && [ "$vercel_target" = "production" ] && [ -n "$vercel_host" ]; then
                  accept_deployment_url "https://${vercel_host}"
                fi

                if [ "$vercel_state" = "ERROR" ] || [ "$vercel_state" = "CANCELED" ] || [ "$vercel_state" = "BLOCKED" ]; then
                  echo "Vercel deployment failed with state: $vercel_state"
                  exit 1
                fi
              fi
            else
              echo "Vercel deployments API is temporarily unavailable (attempt ${attempt}/60); retrying."
            fi

            sleep 10
          done

          echo "Timed out waiting for a successful Vercel production deployment."
          exit 1

      - name: Assign production domain
        run: |
          npx --yes vercel@latest alias set "$VERCEL_DEPLOYMENT_URL" "$PRODUCTION_DOMAIN" \
            --scope "$VERCEL_SCOPE" \
            --token "$VERCEL_TOKEN"

      - name: Verify production domain
        run: |
          for attempt in {1..30}; do
            body="$(curl -fsSL "https://${PRODUCTION_DOMAIN}" || true)"
            if grep -q "Facturación Autónomos" <<< "$body"; then
              exit 0
            fi
            sleep 5
          done

          echo "Production domain did not respond with the expected brand after alias assignment."
          exit 1
