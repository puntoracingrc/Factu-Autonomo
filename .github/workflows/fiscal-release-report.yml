name: Fiscal release report

on:
  pull_request:
    paths:
      - "docs/fiscal/**"
      - "scripts/fiscal-approval/**"
      - "scripts/fiscal-release/**"
      - "src/lib/fiscal-approval/**"
      - "src/lib/fiscal-source-review/**"
      - "src/lib/tax-model-diagnostic/**"
      - "package.json"
      - ".github/workflows/fiscal-release-report.yml"
  push:
    branches: [main]
    paths:
      - "docs/fiscal/**"
      - "scripts/fiscal-approval/**"
      - "scripts/fiscal-release/**"
      - "src/lib/fiscal-approval/**"
      - "src/lib/fiscal-source-review/**"
      - "src/lib/tax-model-diagnostic/**"
      - "package.json"
      - ".github/workflows/fiscal-release-report.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run fiscal:rules:check
      - run: npm run fiscal:approval:validate
      - run: npm run fiscal:release:check
